name: iOS CI

on:
  push:
    branches: [main, claude/hacker-river-native-app-no5ryf]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Pick a simulator
        id: sim
        run: |
          NAME=$(xcrun simctl list devices available | grep -Eo 'iPhone 1[0-9]( Pro)?' | head -1)
          echo "name=${NAME:-iPhone 16}" >> "$GITHUB_OUTPUT"

      - name: Build & test
        run: |
          xcodebuild test \
            -project HackerRiver.xcodeproj \
            -scheme HackerRiver \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            CODE_SIGNING_ALLOWED=NO
